# SlopMachine model registry — the SINGLE source of truth for which model backs each capability.
# Code never hardcodes model ids; it asks the registry. Swapping a model = editing a row here, no code change.
#
# These are SEED entries to make the scaffold runnable. Resolve to the current-best models via the
# /slop-models skill (which reads official docs / HF first). Models come and go — keep this fresh.

capabilities:
  image:
    default: flux2-klein-4b
    models:
      # PERIODIC-UPDATE-RESEARCH: image-default | last-verified=2026-06-24 | latest-stable=FLUX.2-klein-4B
      #   source=https://huggingface.co/black-forest-labs/FLUX.2-klein-4B  (Apache-2.0, ungated)
      #   verified: repo exists + ungated; Flux2KleinPipeline does text-to-image in diffusers 0.38; ~23.7GB download.
      #   notes: bleeding-edge fast default (FLUX.2 klein, 4-step distilled, Jan 2026); needs the EXPLICIT pipeline
      #          class (FLUX.2 is not in diffusers' AutoPipeline t2i map); fits 16GB via model CPU offload.
      flux2-klein-4b:
        repo_id: black-forest-labs/FLUX.2-klein-4B
        pipeline: Flux2KleinPipeline
        precision: bf16
        min_vram_gb: 16
        license: Apache-2.0
        tier: fast
        gen_defaults:
          num_inference_steps: 4
          width: 1024
          height: 1024
        notes: Default. FLUX.2 klein (4B, distilled 4-step), Apache-2.0, ungated. ~24GB; 16GB via model offload.
      # PERIODIC-UPDATE-RESEARCH: image-quality | last-verified=2026-06-24 | latest-stable=Qwen-Image-2512
      #   source=https://huggingface.co/Qwen/Qwen-Image-2512  (Apache-2.0, ungated, text-to-image)
      #   verified: repo exists + ungated; QwenImagePipeline (explicit, not in AutoPipeline map); ~57.7GB download.
      #   notes: Qwen calls it the strongest open image model; 20B MMDiT + Qwen2.5-VL encoder; heavy/slow on 16GB.
      qwen-image:
        repo_id: Qwen/Qwen-Image-2512
        pipeline: QwenImagePipeline
        precision: bf16
        min_vram_gb: 32
        license: Apache-2.0
        tier: quality
        gen_defaults:
          num_inference_steps: 30
          width: 1024
          height: 1024
        notes: Max-quality tier (20B MMDiT, best in-image text). ~58GB; on 16GB uses model offload + VAE tiling (slow).
      # PERIODIC-UPDATE-RESEARCH: image-flux1 | last-verified=2026-06-24 | latest-stable=superseded by FLUX.2
      #   source=https://huggingface.co/black-forest-labs/FLUX.1-dev  notes: prior-gen (12B, Aug 2024); gated.
      flux-dev:
        repo_id: black-forest-labs/FLUX.1-dev
        precision: bf16
        min_vram_gb: 16
        license: FLUX.1-dev Non-Commercial (free local use)
        tier: prior-gen
        gen_defaults:
          num_inference_steps: 28
          guidance_scale: 3.5
          width: 1024
          height: 1024
        notes: Prior-gen (12B, Aug 2024), superseded by FLUX.2. Gated repo (`hf auth login`); model offload on 16GB.
      # Legacy / low-VRAM fallback (2023). NOT the default - kept for 8GB cards + the huge SDXL LoRA/ControlNet ecosystem.
      sdxl:
        repo_id: stabilityai/stable-diffusion-xl-base-1.0
        precision: fp16
        variant: fp16
        min_vram_gb: 8
        license: OpenRAIL++-M
        tier: legacy
        gen_defaults:
          num_inference_steps: 30
          guidance_scale: 7.0
          width: 1024
          height: 1024
        notes: Legacy 2023 fallback for low-VRAM (8GB) + the SDXL LoRA/ControlNet ecosystem. Not the default.
      # --- REMOTE, token-based backends (no local GPU needed) ------------------------------------
      # OFF by default: they only run with SLOP_ALLOW_CLOUD=1 + the provider token (resolve_provider
      # gate). min_vram_gb 0 = runs on the provider's infra. Model ids refreshed via /slop-models.
      hf-flux:
        repo_id: black-forest-labs/FLUX.1-schnell
        provider: hf-inference
        min_vram_gb: 0
        license: Apache-2.0 (FLUX.1 [schnell])
        tier: remote
        gen_defaults:
          num_inference_steps: 4
        notes: >-
          Remote via HuggingFace Inference Providers (InferenceClient.text_to_image). Needs HF_TOKEN
          (or HUGGING_FACE_HUB_TOKEN) + SLOP_ALLOW_CLOUD=1. Pick: `slop image --provider hf-inference -m hf-flux`.
      google:
        repo_id: gemini-3.1-flash-image
        provider: google-genai
        min_vram_gb: 0
        license: Google Gemini API terms (paid)
        tier: remote
        notes: >-
          Remote via Google Gen AI SDK — current Gemini image model ("Nano Banana"), NOT the deprecated
          Imagen. Needs GEMINI_API_KEY (or GOOGLE_API_KEY) + SLOP_ALLOW_CLOUD=1 + the `cloud` extra
          (`uv sync --extra cloud`). Model id refreshed via /slop-models.

  identity:
    default: ip-adapter-sdxl
    models:
      ip-adapter-sdxl:
        repo_id: h94/IP-Adapter
        subfolder: sdxl_models
        weight_name: ip-adapter_sdxl.safetensors
        base_capability: image
        min_vram_gb: 1
        license: Apache-2.0
        notes: Identity-preservation adapter loaded onto the image pipeline; pairs with the SDXL image model.

  # AI-dance flagship: pose-skeleton extraction -> motion transfer (reference person + driving
  # dance video -> that person performing the dance). Open analog of Viggle / Kling / ElevenLabs.
  animation:
    default: wan-animate
    models:
      wan-animate:
        repo_id: Wan-AI/Wan2.2-Animate-14B-Diffusers
        precision: bf16
        min_vram_gb: 16
        license: Apache-2.0
        tier: quality
        pipeline: WanAnimatePipeline
        gen_defaults:
          mode: animate              # "animate" = drive a character; "replace" (M3) swaps into a scene
          segment_frame_length: 21   # SMALL segments keep peak activation within 16GB for ANY clip length
          guidance_scale: 1.0        # Wan-Animate disables CFG by default; raise to use negative_prompt
          num_inference_steps: 12    # quality/speed balance; group-offload streaming is ~20s/step on 16GB
          fps: 16
          max_area: 147456           # ~288x512; MEASURED ~12.5GB peak on the RTX 5080 (bf16 group offload)
        notes: >-
          Diffusers-native WanAnimatePipeline (merged diffusers PR #12526; shipped v0.36-0.38),
          Apache-2.0, ungated. ~76.6GB bf16 repo. 16GB fit = OFFICIAL diffusers group-offloading recipe
          (AnimateStage): transformer leaf_level + use_stream + low_cpu_mem_usage, text_encoder
          block_level, VAE upcast to fp32 and resident; NO pipe.to(cuda); NO fp8 layerwise casting
          (fp8 matmul fails on Blackwell sm_120 + torch cu128). VERIFIED ~12.5GB peak on the RTX 5080.
          REQUIRES the 'pose' assets to turn the raw driving video into pose+face videos first
          (preprocessing is not in diffusers yet -> done by PoseStage). Quantized/GGUF loading is
          currently broken in diffusers for Wan (issue #12009) -> re-check for a faster path later.

  # Driving-signal extractor for Wan-Animate (its preprocessing is not in diffusers). Tiny ONNX
  # models run on CPU onnxruntime (no Blackwell sm_120 dependency). Only the subfolder is fetched.
  pose:
    default: wan-vitpose
    models:
      wan-vitpose:
        repo_id: Wan-AI/Wan2.2-Animate-14B
        subfolder: process_checkpoint
        base_capability: animation
        min_vram_gb: 1
        license: Apache-2.0
        notes: >-
          YOLOv10 person detect (det/yolov10m.onnx) + ViTPose whole-body (pose2d/vitpose_h_wholebody.onnx)
          -> src_pose.mp4 (skeleton) + src_face.mp4. Fetched via `slop assets download pose` (downloads
          only the process_checkpoint/ subfolder, ~hundreds of MB). SAM2 (replace mode) added in M3.
